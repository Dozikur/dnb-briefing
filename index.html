<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnB News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  <style>
    html {
        min-height: 100vh;
        background-color: #111827;
        background-image: linear-gradient(rgba(17, 24, 39, 0.8), rgba(17, 24, 39, 0.8)), url('https://d39-a.sdn.cz/d_39/c_img_oc_A/nPvSisOTaMB8ZnxdmD53QSS/a215/let-it-roll.jpeg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }
    body {
        background-color: transparent;
    }
    .font-unbounded {
      font-family: 'Unbounded', sans-serif;
    }
  </style>
</head>

<body class="antialiased">
  <header class="bg-gray-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-700">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="text-2xl tracking-tighter text-white font-unbounded">
        <span class="font-bold border-b-4 border-red-500 pb-1">DnB</span><span class="font-semibold"> News</span>
      </div>
      <div class="flex items-center space-x-4">
        <div>
          <label for="period-select" class="text-sm font-medium text-gray-400 mr-2">Období</label>
          <select id="period-select" class="bg-gray-800 border border-gray-600 rounded-md py-1 px-2 text-white focus:ring-blue-500 focus:border-blue-500">
            <!-- Options will be populated by JS -->
          </select>
        </div>
      </div>
    </nav>
  </header>

  <main class="container mx-auto p-4 md:p-8">
    <section id="overview" class="mb-16">
      <div class="text-center mb-12 relative">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white font-unbounded">DnB News</h1>
        <p id="date-range" class="mt-2 text-lg text-red-500"></p>
      </div>
      <div class="news-list flex flex-col gap-8" id="news-container">
        <!-- News cards will be loaded here -->
      </div>
    </section>
  </main>

  <footer class="mt-20 border-t border-gray-800">
    <div class="container mx-auto px-6 py-8 text-center text-gray-400">
      <p class="text-sm mt-1">&copy; 2026 DNB NEWS</p>
    </div>
  </footer>

  <script>
    // This list is now dynamically injected
    const newsFiles = ["news/2026-week_1.json","news/2026-week_2.json"];
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const periodSelect = document.getElementById('period-select');
      const newsContainer = document.getElementById('news-container');
      const dateRangeEl = document.getElementById('date-range');

      const renderCard = (item) => {
        const sourceLink = item.source_url ?
          `<a href="${item.source_url}" target="_blank" class="hover:underline">${item.source}</a>` :
          item.source;

        const contentHtml = Array.isArray(item.content)
          ? item.content.map(p => `<p class="text-gray-300 mb-4 leading-relaxed">${p}</p>`).join('')
          : `<p class="text-gray-300 mb-4 leading-relaxed">${item.content}</p>`;

        return `
          <div class="card bg-gray-800/50 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col md:flex-row">
            <div class="md:w-1/3 w-full h-64 md:h-auto relative overflow-hidden">
              <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110" loading="lazy">
            </div>
            <div class="md:w-2/3 p-6 flex flex-col justify-between">
              <div>
                <div class="flex justify-between items-start mb-2">
                    <span class="inline-block px-3 py-1 bg-gradient-to-r from-red-600 to-red-500 text-white text-xs font-bold rounded-full">
                      ${item.genre}
                    </span>
                    <p class="text-sm text-slate-400">
                      ${new Date(item.date).toLocaleDateString('cz-CZ', { year: 'numeric', month: 'long', day: 'numeric' })}
                    </p>
                </div>
                <h4 class="font-bold text-2xl mb-3 text-white">${item.title}</h4>
                <div class="news-content">${contentHtml}</div>
              </div>
              <div class="mt-4">
                <p class="text-sm text-slate-500">Zdroj: ${sourceLink}</p>
              </div>
            </div>
          </div>
        `;
      };

      const loadNews = async (period) => {
        newsContainer.innerHTML = '';
        try {
          const response = await fetch(`${period}`, { cache: 'no-cache' }); // Force reload
          if (!response.ok) throw new Error(`Network response was not ok: ${response.statusText}`);
          const newsItems = await response.json();
          if (newsItems.length > 0) {
            newsItems.forEach(item => {
              newsContainer.innerHTML += renderCard(item);
            });
          } else {
            newsContainer.innerHTML = '<p class="text-center text-gray-400">Pro vybrané období nebyly nalezeny žádné zprávy.</p>';
          }
          const [year, week] = period.replace('news/','').replace('.json','').split('-');
          dateRangeEl.textContent = `Týden ${week.replace('week_', '')}, ${year}`;
        } catch (error) { 
          console.error('Error loading news:', error);
          newsContainer.innerHTML = `<p class="text-center text-red-500">Nastala chyba při načítání zpráv pro ${period}.</p>`;
        }
      };

      const populatePeriodSelector = () => {
        try {
          const periods = newsFiles.slice(); // Create a copy to avoid modifying the original
          periods.sort().reverse(); // Sort descending to have the latest first

          if (periods.length === 0) {
              periodSelect.innerHTML = '<option>Žádná data k zobrazení</option>';
              return;
          }

          periods.forEach(periodFile => {
            const period = periodFile.replace('news/','').replace('.json','');
            const [year, week] = period.split('-');
            const option = document.createElement('option');
            option.value = periodFile; // Use the full path for fetching
            option.textContent = `Týden ${week.replace('week_', '')}, ${year}`;
            periodSelect.appendChild(option);
          });

          periodSelect.addEventListener('change', () => {
            loadNews(periodSelect.value);
          });

          if (periods.length > 0) {
            loadNews(periods[0]); // Load the latest news by default
          }
        } catch (error) {
          console.error('Error populating period selector:', error);
          periodSelect.innerHTML = '<option>Chyba načítání</option>';
        }
      };

      populatePeriodSelector();
    });
  </script>
</body>
</html>
